<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="home.css">
    <title>Footer</title>
    <style>
/* Footer-start */
footer {
  bottom: 0;
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
  text-align: center;
  position: static;
  border-top: 2px solid #674019;
  box-shadow: 2px 1px 10px #674019;
  padding: 20px;
  margin-top: 30px;
  flex-wrap: wrap;
  gap: 10px;
}

footer #footer-nav ul {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 15px;
  padding: 0;
  gap: 8px;
}

footer #footer-nav ul li {
  padding: 0 10px;
  list-style: none;
}

footer #footer-nav ul li a {
  color: #674019;
  text-decoration: none;
  font-size: 14px;
}

footer #copyRight {
  color: #674019;
  margin-top: 15px;
  font-size: 13px;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  footer {
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 16px;
    gap: 6px;
  }

  footer #footer-nav ul {
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-top: 10px;
  }

  footer #footer-nav ul li {
    padding: 0 6px;
  }

  footer #footer-nav ul li a {
    font-size: 13px;
  }

  footer #copyRight {
    font-size: 12px;
    margin-top: 8px;
  }
}

@media (max-width: 480px) {
  footer {
    padding: 12px;
  }

  footer #footer-nav ul {
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  footer #footer-nav ul li a {
    font-size: 12px;
  }
}
/* Footer-end */
    </style>
</head>
<body>
     <footer>
        <div class="logo">
            <img src="media/logo.png" alt="Gold Tracker" width="200px">
        </div>
        <div id="footer-nav">
            <nav>
                <ul>
                    <li>
                        <a href="#">privacy Policy</a>
                    </li>
                     <li>
                        <a href="#">Terms of Service</a>
                    </li>
                     <li>
                        <a href="#">Contact Support</a>
                    </li>
                </ul>
            </nav>
        </div>
        <div id="copyRight">
            &copy;2026 Gilded Ledger . All rights reserved.
        </div>
    </footer>
    
    
</body>
</html>
